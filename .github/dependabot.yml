version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "02:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "dependabot"
      - "maintenance"
    groups:
      npm-dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      npm-prod-patch:
        dependency-type: "production"
        update-types:
          - "patch"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 2

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "02:30"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "dependabot"
      - "maintenance"
