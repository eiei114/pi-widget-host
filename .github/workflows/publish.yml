name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/publish.yml
    tags:
      - 'v*.*.*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to publish (defaults to selected ref)'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif node -e "const p=require('./package.json'); process.exit(p.dependencies || p.devDependencies ? 0 : 1)"; then
            npm install
          else
            echo "No dependencies to install."
          fi

      - name: Validate package
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.ci ? 0 : 1)"; then
            npm run ci
          elif node -e "process.exit(require('./package.json').scripts?.check ? 0 : 1)"; then
            npm run check
          elif node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            npm test
          elif node -e "process.exit(require('./package.json').scripts?.typecheck ? 0 : 1)"; then
            npm run typecheck
          else
            echo "No validation script configured."
          fi

      - name: Skip already published version
        id: published
        shell: bash
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          set +e
          output=$(npm view "${name}@${version}" version 2>&1)
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "${name}@${version} is already published."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$output" | grep -Eq 'E404|404 Not Found'; then
            echo "Publishing ${name}@${version}."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$output" >&2
            exit "$status"
          fi

      - name: Publish to npm
        if: steps.published.outputs.skip != 'true'
        run: npm publish --access public
